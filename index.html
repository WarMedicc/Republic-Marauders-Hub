<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operations Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="crt-overlay"></div>
<script>
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}
</script>


<div class="layout">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <img src="images/RMLogo.png" alt="" class="sidebar-logo">

        <div class="tab" onclick="loadSection('personnel')">Current Personnel</div>
        <div class="tab" onclick="loadSection('missions')">Past Missions</div>
        <div class="tab" onclick="loadSection('hvts')">HVT Profiles</div>


        <div class="sidebar-footer" onclick="logout()">Logout</div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="main">
        <h1>Republic Marauder Dashboard</h1>
        <div id="content"></div>
    </div>

    <div id="sort-controls" style="display:none;">
    <button onclick="sortPersonnel('status')">Sort by Status</button>
    <button onclick="sortPersonnel('name')">Sort by Name</button>
    </div>

    
</div>

<script src="script.js"></script>
</body>
