<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operations Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="crt-overlay"></div>
<script>
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}
</script>


<div class="layout">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <img src="images/RMLogo.png" alt="" class="sidebar-logo">

        <div class="tab" onclick="loadSection('personnel')">Current Personnel</div>
        <div class="tab" onclick="loadSection('missions')">Past Missions</div>
        <div class="tab" onclick="loadSection('hvts')">HVT Profiles</div>


        <div class="sidebar-footer" onclick="logout()">Logout</div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="main">
        <h1>Republic Marauder Dashboard</h1>
        
        <div id="filter-controls" style="display:none;">
        <select id="rank-filter" onchange="applyFilters()">
        <option value="ALL">All Ranks</option>
        </select>

        <select id="status-filter" onchange="applyFilters()">
        <option value="ALL">All Statuses</option>
        <option value="ACTIVE">Active</option>
        <option value="INJURED">Injured</option>
        <option value="ON LEAVE">On Leave</option>
        <option value="MIA">MIA</option>
        <option value="DECEASED">DECEASED</option>
        </select>

        <select id="company-filter" onchange="applyFilters()">
        <option value="ALL">All Companies</option>
        <option value="Shadow">Shadow</option>
        <option value="Assassin">Assassin</option>
        <option value="Purge">Purge</option>
        <option value="Command">Command</option>
        </select>
        </div>
        
        
        
        <div id="content"></div>
        
        

    
    </div>
</div>

<script src="script.js"></script>
</body>
