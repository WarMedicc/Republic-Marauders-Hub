<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h2>REPUBLIC MARAUDER ACCESS PORTAL</h2>

    <input type="password" id="password" placeholder="Enter Access Code">
    <button onclick="login()">Login</button>

    <p id="error" class="error"></p>
</div>
<div id="boot-screen">
    <div class="boot-text">
        <p>Connecting to Republic Marauder Systems...</p>
        <p>Decrypting secure modules...</p>
        <p>Loading personnel registry...</p>
        <p>Loading mission archives...</p>
        <p>Establishing encrypted uplink...</p>
        <p class="boot-complete">ACCESS GRANTED</p>
    </div>
</div>


<img src="images/RMLogo.png" alt="" style="height: 250px; width: 250px;">
<script>
async function login() {
    const input = document.getElementById("password").value;

    const encoder = new TextEncoder();
    const data = encoder.encode(input);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

    const correctHash = "b2b5f2a4b0f0c6d4b1c8f8b4e7f6a3d9e2c7b1f4d8e9c0a1b5d3f2e4c6a7b8d9";

    if (hashHex === correctHash) {
        localStorage.setItem("loggedIn", "true");

        // Hide login UI
        document.querySelector(".login-container").style.display = "none";

        // Show boot screen
        const boot = document.getElementById("boot-screen");
        boot.style.display = "flex";

        // After boot animation, go to dashboard
        setTimeout(() => {
            window.location.href = "index.html";
        }, 3500);

    } else {
        document.getElementById("error").textContent = "Oracle notified. Target will be exterminated.";
    }
}
</script>


</body>
</html>
