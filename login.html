<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h2>REPUBLIC MARAUDER ACCESS PORTAL</h2>

    <input type="password" id="password" placeholder="Enter Access Code">
    <button onclick="login()">Login</button>

    <p id="error" class="error"></p>
</div>

<script>
async function login() {
    const input = document.getElementById("password").value;

    // Hash the input using built‑in Web Crypto API
    const encoder = new TextEncoder();
    const data = encoder.encode(input);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

    // Stored hashed password (NOT the real password)
    const correctHash = "98dcc5bcacf1071483c23cc9f4602cad";

    if (hashHex === correctHash) {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "index.html";
    } else {
        document.getElementById("error").textContent = "Invalid access code.";
    }
}
</script>


</body>
</html>
