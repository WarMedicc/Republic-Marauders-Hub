<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h2>REPUBLIC MARAUDER ACCESS PORTAL</h2>

    <input type="password" id="password" placeholder="Enter Access Code">
    <button onclick="login()">Login</button>

    <p id="error" class="error"></p>
</div>
<img src="" alt="">
<script>
async function login() {
    const input = document.getElementById("password").value;

    const encoder = new TextEncoder();
    const data = encoder.encode(input);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

    const correctHash = "81685f8a5d903c4a2ac63635143386e35326b803eee852a9510b7fb0c253b892";

    if (hashHex === correctHash) {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "index.html";
    } else {
        document.getElementById("error").textContent = "Oracle notified. Target will be exterminated.";
    }
}
</script>


</body>
