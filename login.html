<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h2>REPUBLIC MARAUDER ACCESS PORTAL</h2>

    <input type="password" id="password" placeholder="Enter Access Code">
    <button onclick="login()">Login</button>

    <p id="error" class="error"></p>
</div>

<script>
async function login() {
    const input = document.getElementById("password").value;

    const encoder = new TextEncoder();
    const data = encoder.encode(input);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
   
    const correctHash = "d0f4f5a8c3e5f9b2c0b4d3e8a1f7c6d4e8b9a2c3d4f5e6a7b8c9d0e1f2a3b4c5
";

    if (hashHex === correctHash) {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "index.html";
    } else {
        document.getElementById("error").textContent = "Invalid access code.";
    }
}
</script>


</body>
</html>
